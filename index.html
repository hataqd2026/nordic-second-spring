<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北欧第二春 · 测试版</title>
    <style>
        body {
            font-family: -apple-system, 'PingFang SC', sans-serif;
            background: #f5f2ed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #fff;
            border-radius: 32px;
            padding: 30px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }
        .brand {
            text-align: center;
            font-size: 12px;
            color: #b8a69b;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .brand span {
            background: #f0ebe6;
            padding: 2px 14px;
            border-radius: 20px;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .home-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            color: #2c2a28;
        }
        .home-title small {
            display: block;
            font-size: 14px;
            font-weight: 400;
            color: #b8a69b;
            margin-top: 6px;
        }
        .btn-primary {
            display: block;
            width: 100%;
            padding: 16px;
            background: #2c2a28;
            color: #fff;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .question-text {
            font-size: 18px;
            font-weight: 500;
            color: #2c2a28;
            margin: 16px 0;
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 14px 18px;
            background: #f8f5f2;
            border: 2px solid transparent;
            border-radius: 14px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
            text-align: left;
        }
        .option-btn.selected {
            border-color: #2c2a28;
            background: #f0ebe6;
        }
        .result-box {
            background: #f8f5f2;
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0;
            text-align: center;
        }
        .result-box .tag {
            font-size: 20px;
            font-weight: 700;
            color: #2c2a28;
        }
        .hidden {
            display: none !important;
        }
        .mt-12 {
            margin-top: 12px;
        }
        .text-center {
            text-align: center;
        }
        .btn-secondary {
            display: block;
            width: 100%;
            padding: 14px;
            background: #f0ebe6;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand"><span>✦ 北欧第二春 · 测试版</span></div>

    <!-- 首页 -->
    <div class="page active" id="page-home">
        <div class="home-title">
            测出你的优势
            <small>3道题 · 1分钟</small>
        </div>
        <button class="btn-primary" onclick="startQuiz()">开始测试</button>
    </div>

    <!-- 做题页 -->
    <div class="page" id="page-quiz">
        <div id="qIndex" style="font-size:13px;color:#b8a69b;">第 1/3 题</div>
        <div class="question-text" id="qText">加载中...</div>
        <div id="optionsContainer"></div>
        <div style="display:flex;gap:12px;margin-top:12px;">
            <button class="btn-secondary" id="btnPrev" onclick="prevQ()" style="flex:1;">上一题</button>
            <button class="btn-secondary" id="btnNext" onclick="nextQ()" style="flex:1;background:#2c2a28;color:#fff;">下一题</button>
        </div>
    </div>

    <!-- 结果页 -->
    <div class="page" id="page-result">
        <div class="result-box">
            <div style="font-size:40px;" id="rIcon">🌟</div>
            <div class="tag" id="rTag">你的优势</div>
            <div style="color:#4a4340;margin-top:6px;" id="rDesc">描述</div>
        </div>
        <button class="btn-secondary" onclick="resetQuiz()">重新测试</button>
    </div>
</div>

<script>
    // ===== 3道测试题 =====
    var questions = [
        { text: '朋友难过时我能感觉到', dim: '共情力' },
        { text: '我说话别人愿意听', dim: '表达力' },
        { text: '想到就去做，不拖延', dim: '行动力' }
    ];

    var resultMap = {
        '共情力': { icon: '🤝', tag: '共情力', desc: '你善于感知他人情绪' },
        '表达力': { icon: '🎙️', tag: '表达力', desc: '你擅长表达自己' },
        '行动力': { icon: '🚀', tag: '行动力', desc: '你执行力很强' }
    };

    var cur = 0;
    var answers = [];
    var scores = { '共情力': 0, '表达力': 0, '行动力': 0 };

    function $(id) { return document.getElementById(id); }

    function startQuiz() {
        cur = 0;
        answers = [];
        scores = { '共情力': 0, '表达力': 0, '行动力': 0 };
        $('page-home').classList.remove('active');
        $('page-quiz').classList.add('active');
        render();
    }

    function render() {
        var q = questions[cur];
        $('qIndex').textContent = '第 ' + (cur + 1) + '/3 题';
        $('qText').textContent = q.text;
        $('btnPrev').disabled = (cur === 0);

        var container = $('optionsContainer');
        container.innerHTML = '';
        var opts = ['非常符合', '一般符合', '不太符合'];
        opts.forEach(function(text, idx) {
            var btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = text;
            if (answers[cur] === idx) btn.classList.add('selected');
            btn.onclick = function() { selectOption(idx); };
            container.appendChild(btn);
        });

        if (cur === questions.length - 1) {
            $('btnNext').textContent = '查看结果';
        } else {
            $('btnNext').textContent = '下一题 →';
        }
        $('btnNext').disabled = (answers[cur] === undefined);
    }

    function selectOption(idx) {
        answers[cur] = idx;
        var q = questions[cur];
        scores[q.dim] = (scores[q.dim] || 0) + (3 - idx);

        var btns = $('optionsContainer').querySelectorAll('.option-btn');
        btns.forEach(function(b, i) { b.classList.toggle('selected', i === idx); });
        $('btnNext').disabled = false;
    }

    function prevQ() {
        if (cur > 0) { cur--;
            render(); }
    }

    function nextQ() {
        if (answers[cur] === undefined) return;
        if (cur < questions.length - 1) {
            cur++;
            render();
        } else {
            showResult();
        }
    }

    function showResult() {
        $('page-quiz').classList.remove('active');
        $('page-result').classList.add('active');

        var maxDim = '共情力';
        var maxScore = -1;
        for (var d in scores) {
            if (scores[d] > maxScore) { maxScore = scores[d];
                maxDim = d; }
        }
        var data = resultMap[maxDim];
        $('rIcon').textContent = data.icon;
        $('rTag').textContent = data.tag;
        $('rDesc').textContent = data.desc;
    }

    function resetQuiz() {
        $('page-result').classList.remove('active');
        $('page-home').classList.add('active');
        cur = 0;
        answers = [];
        scores = { '共情力': 0, '表达力': 0, '行动力': 0 };
    }

    // 暴露到全局
    window.startQuiz = startQuiz;
    window.prevQ = prevQ;
    window.nextQ = nextQ;
    window.resetQuiz = resetQuiz;
</script>

</body>
</html>
